name: rukunin
description: "Rukunin — Aplikasi manajemen RT/RW digital."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  uuid: ^4.5.1

  # Backend
  supabase_flutter: ^2.9.1

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigasi
  go_router: ^17.1.0

  # HTTP
  dio: ^5.8.0+1

  # Local storage
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0

  # Environment
  flutter_dotenv: ^6.0.0

  # Push notification
  firebase_core: ^4.5.0
  firebase_messaging: ^16.1.2
  flutter_local_notifications: ^21.0.0

  # Chart
  fl_chart: ^1.1.1

  # Gambar
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # PDF
  pdf: ^3.11.3
  printing: ^5.14.2

  # Payment (WebView)
  webview_flutter: ^4.10.0

  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.0

  # Format angka & tanggal
  intl: ^0.20.2

  # Model
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # File
  excel: ^4.0.6
  share_plus: ^12.0.1

  # UI
  shimmer: ^3.0.0
  table_calendar: ^3.2.0
  file_picker: ^10.3.10
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  file_saver: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  riverpod_generator: ^4.0.3

  # Testing
  mocktail: ^0.3.0

flutter:
  uses-material-design: true

  assets:
    - .env
